<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" fill="none">
  <!-- Hat body (cylinder) -->
  <rect x="34" y="52" width="72" height="34" rx="4" fill="rgba(255,203,5,0.08)" stroke="#FFCB05" stroke-width="1.5"/>
  <!-- Bottom rim ellipse -->
  <ellipse cx="70" cy="86" rx="36" ry="8" fill="rgba(255,203,5,0.12)" stroke="#FFCB05" stroke-width="1.5"/>
  <!-- Board (mortarboard top) -->
  <polygon points="70,10 122,34 70,58 18,34" fill="rgba(255,203,5,0.12)" stroke="#FFCB05" stroke-width="2"/>
  <!-- Board top highlight -->
  <polygon points="70,10 122,34 70,36 18,34" fill="rgba(255,203,5,0.06)"/>
  <!-- Center button on board -->
  <circle cx="70" cy="34" r="5" fill="#FFCB05"/>
  <!-- Tassel string (Michigan tassel goes left) -->
  <line x1="70" y1="34" x2="45" y2="34" stroke="#FFCB05" stroke-width="2.5"/>
  <line x1="45" y1="34" x2="45" y2="68" stroke="#FFCB05" stroke-width="2.5"/>
  <!-- Tassel fringe -->
  <line x1="38" y1="68" x2="34" y2="88" stroke="#FFCB05" stroke-width="2"/>
  <line x1="41" y1="69" x2="39" y2="90" stroke="#FFCB05" stroke-width="2"/>
  <line x1="45" y1="70" x2="45" y2="92" stroke="#FFCB05" stroke-width="2"/>
  <line x1="49" y1="69" x2="51" y2="90" stroke="#FFCB05" stroke-width="2"/>
  <line x1="52" y1="68" x2="56" y2="88" stroke="#FFCB05" stroke-width="2"/>
  <!-- Tassel knot -->
  <rect x="39" y="65" width="12" height="6" rx="3" fill="#FFCB05"/>
</svg>
